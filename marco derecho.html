<html>
<head>
<title>
Index Principal
</title>
<style>
body{
background-color:#050816;
font-family:Arial;
color:white;
margin:0;
padding:0;
}
.banner{
width:100%;
height:350px;
background-image:url("https://wallpaperaccess.com/full/4882890.png");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
}
.texto{
margin-left:50px;
}
h1{
font-size:60px;
margin:0;
color:white;
}
h2{
font-size:70px;
margin:0;
color:#7C3AED;
}
p{
font-size:22px;
color:#D1D5DB;
}
.boton{
display:inline-block;
margin-top:20px;
padding:15px 30px;
background-color:#7C3AED;
color:white;
text-decoration:none;
border-radius:10px;
font-size:20px;
transition:0.3s;
}
.boton:hover{
background-color:#9333EA;
box-shadow:0px 0px 15px #7C3AED;
}
.contenedor{
padding:30px;
}
.titulo{
font-size:35px;
margin-bottom:20px;
color:#7C3AED;
}
.tarjetas{
display:flex;
gap:20px;
}
.card{
background-color:#111827;
border-radius:15px;
overflow:hidden;
width:300px;
transition:0.3s;
}
.card:hover{
transform:scale(1.05);
box-shadow:0px 0px 15px #7C3AED;
}
.card img{
width:100%;
height:180px;
object-fit:cover;
}
.info{
padding:15px;
}
.info h3{
margin:0;
font-size:22px;
}
.info p{
font-size:16px;
color:#D1D5DB;
}
</style>
</head>
<body>
<div class="banner">
<div class="texto">
<h1>
VIVE EL GAMING
</h1>
<h2>
SE LA LEYENDA
</h2>
<p>
Noticias, tops y contenido gamer.
</p>
<a href="#" class="boton">
EXPLORAR
</a>
</div>
</div>
<div class="contenedor">
<h2 class="titulo">
NOTICIAS DESTACADAS
</h2>
<div class="tarjetas">
<div class="card">
<img src="1imagen.jpg">
<div class="info">
<h3>
Nuevo RPG
</h3>
<p>
Explora un nuevo mundo abierto.
</p>
</div>
</div>
<div class="card">
<img src="2imagen.jpg">
<div class="info">
<h3>
Actualización
</h3>
<p>
Nuevos mapas y personajes.
</p>
</div>
</div>
<div class="card">
<img src="3imagen.jpg">
<div class="info">
<h3>
Próximos Lanzamientos
</h3>
<p>
Los juegos más esperados del año.
</p>
</div>
</div>
</div>
</div>
</body>
</html>
